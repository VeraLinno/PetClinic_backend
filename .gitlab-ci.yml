stages:
  - verify
  - package
  - deploy

default:
  tags:
    - petclinic-runner

variables:
  COMPOSE_PROJECT_NAME: petclinic
  GIT_CLEAN_FLAGS: none

hooks:
  pre_get_sources_script:
    - |
      if command -v sudo >/dev/null 2>&1; then
        sudo -n chown -R "$(id -u):$(id -g)" "$CI_PROJECT_DIR" || true
        sudo -n rm -rf \
          "$CI_PROJECT_DIR/src/PetClinic.Api/bin" \
          "$CI_PROJECT_DIR/src/PetClinic.Api/obj" \
          "$CI_PROJECT_DIR/src/PetClinic.Application/bin" \
          "$CI_PROJECT_DIR/src/PetClinic.Application/obj" \
          "$CI_PROJECT_DIR/src/PetClinic.Domain/bin" \
          "$CI_PROJECT_DIR/src/PetClinic.Domain/obj" \
          "$CI_PROJECT_DIR/src/PetClinic.Infrastructure/bin" \
          "$CI_PROJECT_DIR/src/PetClinic.Infrastructure/obj" \
          "$CI_PROJECT_DIR/tests/PetClinic.Tests/bin" \
          "$CI_PROJECT_DIR/tests/PetClinic.Tests/obj" || true
      fi

backend_verify:
  stage: verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - docker info
    - >
      docker run --rm
      -e DOCKER_HOST=unix:///var/run/docker.sock
      -v /var/run/docker.sock:/var/run/docker.sock
      -v "$CI_PROJECT_DIR":/src
      -w /src
      mcr.microsoft.com/dotnet/sdk:9.0
      sh -lc "dotnet test tests/PetClinic.Tests/PetClinic.Tests.csproj -c Release --verbosity normal"

backend_container_smoke:
  stage: package
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  needs:
    - job: backend_verify
  script:
    - docker info
    - docker build -f src/PetClinic.Api/Dockerfile -t petclinic-api:$CI_COMMIT_SHORT_SHA .
    - docker rm -f petclinic-api-smoke || true
    - docker run -d --name petclinic-api-smoke -p 18080:5000 petclinic-api:$CI_COMMIT_SHORT_SHA
    - |
      for i in $(seq 1 45); do
        if docker run --rm --network container:petclinic-api-smoke curlimages/curl:8.8.0 -fsS http://localhost:5000/api/v1/health >/dev/null 2>&1; then
          echo "API container smoke check passed"
          docker rm -f petclinic-api-smoke >/dev/null 2>&1 || true
          exit 0
        fi
        sleep 2
      done
      echo "ERROR: API container smoke check failed"
      docker logs petclinic-api-smoke --tail 200 || true
      docker rm -f petclinic-api-smoke >/dev/null 2>&1 || true
      exit 1

deploy_backend:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - job: backend_verify
    - job: backend_container_smoke
  script:
    - docker info
    - docker compose version
    - docker compose --env-file .env up --build --remove-orphans --detach db api
    - docker compose ps
    - |
      wait_for_url() {
        local url="$1"
        local name="$2"
        local retries=30
        local delay=2

        for i in $(seq 1 $retries); do
          if command -v curl >/dev/null 2>&1; then
            if curl -fsS "$url" >/dev/null; then
              echo "$name is healthy: $url"
              return 0
            fi
          else
            if wget -qO- "$url" >/dev/null; then
              echo "$name is healthy: $url"
              return 0
            fi
          fi

          echo "Waiting for $name ($i/$retries): $url"
          sleep "$delay"
        done

        echo "ERROR: $name failed health check: $url"
        docker compose logs api --tail 200 || true
        return 1
      }

      wait_for_url "http://localhost:5001/api/v1/health" "api"

      echo "Deployment smoke checks passed"