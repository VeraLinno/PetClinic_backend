stages:
  - deploy

deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - petclinic-runner
  variables:
    COMPOSE_PROJECT_NAME: petclinic
  script:
    - docker info
    - docker compose version
    - docker compose --env-file .env up --build --remove-orphans --detach
    - docker compose ps