name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (.NET build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Test project
        run: dotnet test tests/PetClinic.Tests/PetClinic.Tests.csproj -c Release --verbosity normal

  container-smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/PetClinic.Api/Dockerfile -t petclinic-api:${{ github.sha }} .

      - name: Run and verify health
        run: |
          set -e
          SMOKE_NET="petclinic-backend-smoke-${{ github.run_id }}-${{ github.run_attempt }}"
          SMOKE_DB="petclinic-db-smoke-${{ github.run_id }}-${{ github.run_attempt }}"
          SMOKE_API="petclinic-api-smoke-${{ github.run_id }}-${{ github.run_attempt }}"
          docker network create "$SMOKE_NET"
          cleanup() {
            docker rm -f "$SMOKE_API" "$SMOKE_DB" >/dev/null 2>&1 || true
            docker network rm "$SMOKE_NET" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d --name "$SMOKE_DB" --network "$SMOKE_NET" \
            -e POSTGRES_DB=petclinicdb \
            -e POSTGRES_USER=pguser \
            -e POSTGRES_PASSWORD=change-me \
            postgres:16-alpine

          docker run -d --name "$SMOKE_API" --network "$SMOKE_NET" \
            -e ConnectionStrings__DefaultConnection="Host=$SMOKE_DB;Port=5432;Database=petclinicdb;Username=pguser;Password=change-me" \
            -e ASPNETCORE_URLS=http://+:5000 \
            petclinic-api:${{ github.sha }}

          for i in $(seq 1 60); do
            if docker run --rm --network "$SMOKE_NET" curlimages/curl:8.8.0 -fsS "http://$SMOKE_API:5000/api/v1/health" >/dev/null 2>&1; then
              echo "API container is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: API container health check failed"
          docker logs "$SMOKE_DB" --tail 200 || true
          docker logs "$SMOKE_API" --tail 200 || true
          exit 1

  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs:
      - verify
      - container-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
        run: |
          set -e
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ] || [ -z "$BACKEND_DEPLOY_PATH" ]; then
            echo "Missing one or more backend deploy secrets"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.BACKEND_DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file .env up --build --remove-orphans --detach db api
            for i in $(seq 1 30); do
              if command -v curl >/dev/null 2>&1; then
                if curl -fsS http://localhost:5001/api/v1/health >/dev/null; then
                  echo "Backend deploy smoke check passed"
                  exit 0
                fi
              else
                if wget -qO- http://localhost:5001/api/v1/health >/dev/null; then
                  echo "Backend deploy smoke check passed"
                  exit 0
                fi
              fi
              sleep 2
            done
            echo "ERROR: Backend deploy smoke check failed"
            docker compose logs api --tail 200 || true
            exit 1